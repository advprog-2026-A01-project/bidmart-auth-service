name: Auth Service CI/CD

on:
  push:
    branches:
      - main
      - "tdd/**"
      - "feat/**"
      - "ci/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U auth -d auth_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/auth_db
      SPRING_DATASOURCE_USERNAME: auth
      SPRING_DATASOURCE_PASSWORD: auth
      AUTH_GRPC_PORT: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Test, coverage, and PMD
        run: ./gradlew clean generateProto test jacocoTestReport pmdMain pmdTest

      - name: Verify quality reports
        run: bash scripts/verify-quality-reports.sh

      - name: Print coverage summary
        run: bash scripts/print-coverage-summary.sh

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-quality-reports
          path: |
            build/reports/tests/test
            build/reports/pmd
            build/reports/jacoco/test

  docker:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image locally
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build -t "$IMAGE_NAME:ci" .
          docker image inspect "$IMAGE_NAME:ci"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish Docker image to GHCR
        if: github.event_name == 'push'
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHORT_SHA="${GITHUB_SHA::12}"
          SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g')"

          docker tag "$IMAGE_NAME:ci" "$IMAGE_NAME:$SHORT_SHA"
          docker tag "$IMAGE_NAME:ci" "$IMAGE_NAME:$SAFE_REF"

          docker push "$IMAGE_NAME:$SHORT_SHA"
          docker push "$IMAGE_NAME:$SAFE_REF"

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            docker tag "$IMAGE_NAME:ci" "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:latest"
          fi

          echo "Published $IMAGE_NAME:$SHORT_SHA"
          echo "Published $IMAGE_NAME:$SAFE_REF"
