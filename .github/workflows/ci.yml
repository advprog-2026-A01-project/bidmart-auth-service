name: Auth Service CI

on:
  push:
    branches:
      - main
      - "tdd/**"
      - "feat/**"
      - "ci/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U auth -d auth_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/auth_db
      SPRING_DATASOURCE_USERNAME: auth
      SPRING_DATASOURCE_PASSWORD: auth
      AUTH_GRPC_PORT: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Test and PMD
        run: ./gradlew clean generateProto test pmdMain pmdTest

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-quality-reports
          path: |
            build/reports/tests/test
            build/reports/pmd

  docker:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bidmart-auth-service:ci .
